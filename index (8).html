    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-ivory: #f4f7f5;
            --deep-teal: #062620;
            --accent-emerald: #12694b;
            --mint-glow: #eef8f4;
            --glass-white: rgba(255, 255, 255, 0.82);
            --border-soft: rgba(18, 105, 75, 0.12);
            --shadow-elevated: 0 20px 40px -15px rgba(6, 38, 32, 0.06), 0 0 0 1px rgba(18, 105, 75, 0.04);
            --shadow-hover: 0 35px 60px -20px rgba(6, 38, 32, 0.15), 0 0 0 1px var(--accent-emerald);
            --transition-butter: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ivory);
            color: #162a25;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e3ebe7; }
        ::-webkit-scrollbar-thumb { background: var(--accent-emerald); border-radius: 4px; }

        /* HEADER & NAVIGATION */
        .nav-master {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 1400px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 30px rgba(6, 38, 32, 0.04);
            padding: 10px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s var(--transition-butter);
        }
        
        .logo-brand-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* FLASHING NOTICE BANNER SYSTEM */
        .flashing-notice-bar {
            background-color: #ffebeb;
            border-bottom: 2px solid #ff4d4d;
            color: #cc0000;
            text-align: center;
            padding: 12px 20px;
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-top: 100px; 
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.05);
        }

        .flashing-notice-bar i {
            animation: notice-flash 1.2s infinite alternate cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes notice-flash {
            0% { opacity: 0.3; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.08); color: #ff0000; }
        }

        .hero-ram {
            margin-top: 0 !important;
            padding-top: 80px !important;
        }

        @media (max-width: 1024px) {
            .flashing-notice-bar {
                margin-top: 85px;
                font-size: 0.85rem;
                padding: 10px 16px;
            }
        }

/* Base styling updates for the glass card */
.hero-card {
    max-width: 820px;
    width: 100%; 
    background: rgba(6, 38, 32, 0.45); /* Darker container background to preserve text legibility over clear images */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 36px 48px;
    border-radius: 32px;
    text-align: center;
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    animation: floatUp 1.2s var(--transition-butter);
}

/* SCROLL DOWN ARROW SYSTEM */
.scroll-indicator {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: rgba(255, 255, 255, 0.8);
    text-decoration: none;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.3s, opacity 0.3s;
    z-index: 15;
}

.scroll-indicator:hover {
    color: #ffffff;
}

.scroll-indicator i {
    font-size: 1.1rem;
    animation: bounceArrow 2s infinite;
}

@keyframes bounceArrow {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
    60% { transform: translateY(-3px); }
}

/* MOBILE RESPONSIVENESS BREAKPOINT */
@media (max-width: 768px) {
    .hero-ram {
        min-height: 50vh !important; 
        padding: 100px 16px 50px !important;
    }

    .hero-card {
        padding: 24px 20px;
        border-radius: 20px;
    }

    .hero-card h1 {
        font-size: 1.8rem !important;
        letter-spacing: -0.8px;
        margin-bottom: 8px;
    }

    .hero-card p {
        font-size: 0.9rem !important;
        line-height: 1.4;
    }

    .btn-primary {
        margin-top: 16px !important;
        padding: 10px 24px !important;
        font-size: 0.85rem !important;
    }
}

        .nav-links { display: flex; gap: 28px; }

        .nav-links a:after {

        .nav-links a:hover:after { width: 100%; }

        .mobile-toggle {

        }
        .hero-card p { font-size: 1.05rem; line-height: 1.55; opacity: 0.95; font-weight: 400; }
