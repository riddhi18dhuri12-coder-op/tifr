<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title> Ramanujan House | Official Guesthouse Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-ivory: #f4f7f5;
            --deep-teal: #062620;
            --accent-emerald: #12694b;
            --mint-glow: #eef8f4;
            --glass-white: rgba(255, 255, 255, 0.82);
            --border-soft: rgba(18, 105, 75, 0.12);
            --shadow-elevated: 0 20px 40px -15px rgba(6, 38, 32, 0.06), 0 0 0 1px rgba(18, 105, 75, 0.04);
            --shadow-hover: 0 35px 60px -20px rgba(6, 38, 32, 0.15), 0 0 0 1px var(--accent-emerald);
            --transition-butter: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ivory);
            color: #162a25;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e3ebe7; }
        ::-webkit-scrollbar-thumb { background: var(--accent-emerald); border-radius: 4px; }

        /* HEADER & NAVIGATION */
        .nav-master {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 1400px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 30px rgba(6, 38, 32, 0.04);
            padding: 10px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s var(--transition-butter);
        }
        
        .logo-brand-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .tifr-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
        }

        .logo-brand {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--deep-teal), var(--accent-emerald));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            white-space: nowrap;
        }
        
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            color: #23423a;
            transition: color 0.25s;
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
        }
        .nav-links a i { font-size: 0.8rem; opacity: 0.6; transition: transform 0.3s; }
        .nav-links a:hover { color: var(--accent-emerald); }
        .nav-links a:hover i { transform: translateY(-1px); opacity: 1; }
        
        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2.5px;
            background: var(--accent-emerald);
            border-radius: 2px;
            transition: width 0.3s var(--transition-butter);
        }
        .nav-links a:hover:after { width: 100%; }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--deep-teal);
            cursor: pointer;
            z-index: 2100;
            padding: 4px;
        }

        /* HERO AREA */
        .hero-ram {
            min-height: 75vh;
            background: linear-gradient(rgba(4, 25, 21, 0.6), rgba(6, 38, 32, 0.75)), url('main.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 0 40px 40px;
            position: relative;
            padding: 140px 20px 80px;
        }
        .hero-card {
            max-width: 820px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 48px 56px;
            border-radius: 32px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            animation: floatUp 1.2s var(--transition-butter);
        }
        .hero-card h1 {
            font-size: 3.4rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 18px;
            background: linear-gradient(120deg, #ffffff, #d5ece2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero-card p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; font-weight: 400; }
        
        .btn-primary {
            display: inline-flex;
            background: #ffffff;
            border: none;
            margin-top: 28px;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--deep-teal);
            gap: 10px;
            transition: all 0.4s var(--transition-butter);
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            align-items: center;
        }
        .btn-primary:hover { 
            transform: translateY(-3px) scale(1.02); 
            background: var(--mint-glow);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* STRUCTURAL WRAPPERS */
        .section-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 90px 40px;
        }
        .section-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent-emerald);
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-head {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 48px;
            position: relative;
            color: var(--deep-teal);
        }
        .section-head:after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 50px;
            height: 4.5px;
            background: var(--accent-emerald);
            border-radius: 4px;
        }

        /* ABOUT GRID & BENTO IMAGES */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            align-items: stretch;
            margin-bottom: 32px;
        }
        .glass-info {
            background: white;
            border-radius: 28px;
            padding: 40px;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: box-shadow 0.3s ease;
        }
        .glass-info:hover { box-shadow: 0 25px 50px -15px rgba(6,38,32,0.08); }
        
        .bento-showcase {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 190px;
            gap: 20px;
        }
        .bento-item {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--border-soft);
        }
        .bento-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: block;
        }
        .bento-item:hover img { transform: scale(1.05); }
        .span-full-width { grid-column: span 2; }
        .span-full-height { grid-row: span 2; }

        .bento-caption {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(6, 38, 32, 0.85) 0%, rgba(0,0,0,0) 60%);
            display: flex;
            align-items: flex-end;
            padding: 24px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .bento-item:hover .bento-caption { opacity: 1; }

        /* ROOM TRIPTYCH */
        .room-triptych {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            margin-top: 20px;
        }
        .room-card-3d {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.4s var(--transition-butter);
            box-shadow: var(--shadow-elevated);
            border: 1px solid rgba(18, 105, 75, 0.08);
        }
        .room-card-3d:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); }
        .room-img-strip { height: 250px; overflow: hidden; position: relative; }
        .room-img-strip img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; display: block; }
        .room-card-3d:hover .room-img-strip img { transform: scale(1.05); }
        .room-content { padding: 32px; }
        .room-content h3 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--deep-teal);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .room-content h3 i { color: var(--accent-emerald); }
        .room-content p { font-size: 0.96rem; color: #485c56; margin-bottom: 16px; line-height: 1.55; }
        .amenities-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; font-size: 0.78rem; font-weight: 600; }
        .amenities-list span {
            background: var(--mint-glow);
            padding: 6px 14px;
            border-radius: 40px;
            color: var(--accent-emerald);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* TARIFF TABLE */
        .tariff-elegant {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--border-soft);
            overflow: hidden;
        }
        .tariff-table {
            width: 100%;
            border-collapse: collapse;
        }
        .tariff-table th {
            text-align: left;
            padding: 22px;
            font-weight: 700;
            color: var(--deep-teal);
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #e5ede9;
        }
        .tariff-table td { padding: 20px; border-bottom: 1px solid #edf2ef; font-weight: 500; font-size: 0.98rem; }
        .tariff-table tr:last-child td { border-bottom: none; }
        .rate-badge {
            background: #eef7f3;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: var(--accent-emerald);
            display: inline-block;
            border: 1px solid rgba(18, 105, 75, 0.08);
        }

        /* INFRASTRUCTURE PANES & GRIDS */
        .facilities-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }
        .facil-card {
            background: white;
            padding: 36px 24px;
            text-align: center;
            border-radius: 24px;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--border-soft);
            transition: all 0.3s ease;
        }
        .facil-card:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(6,38,32,0.06); }
        .facil-card i { font-size: 2.2rem; color: var(--accent-emerald); margin-bottom: 18px; display: block; }
        .facil-card h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: var(--deep-teal); }
        .facil-card p { font-size: 0.88rem; color: #5c6e69; line-height: 1.45; }

        .info-dual {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 40px;
            margin-top: 40px;
        }
        .info-pane-img {
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--border-soft);
            height: 100%;
            min-height: 300px;
        }
        .info-pane-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* FOOTER PANEL */
        .footer-ultimate {
            background: var(--deep-teal);
            border-radius: 40px 40px 0 0;
            padding: 70px 40px 35px;
            color: #d1e2dd;
        }
        .footer-flex {
            display: grid;
            grid-template-columns: 1.10fr 0.90fr;
            gap: 50px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .contact-pill {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 22px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            font-size: 0.92rem;
            transition: background 0.3s;
        }
        .contact-pill:hover { background: rgba(255,255,255,0.07); }
        .contact-pill i { color: #59ca9f; font-size: 1.1rem; }

        /* LIGHTBOX SYSTEM */
        .lightbox-orb {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(4, 20, 17, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .lightbox-inner {
            position: relative;
            max-width: 85vw;
            max-height: 85vh;
            animation: zoomEffect 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .lightbox-inner img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 20px;
            box-shadow: 0 40px 90px rgba(0,0,0,0.6);
            object-fit: contain;
        }
        @keyframes zoomEffect {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* UNIVERSAL SCREEN MEDIA QUERIES */
        @media (max-width: 1024px) {
            .room-triptych, .facilities-grid, .about-grid, .info-dual, .footer-flex { 
                grid-template-columns: 1fr !important; 
            }
            .bento-showcase { grid-template-columns: 1fr; grid-auto-rows: 220px; }
            .span-full-width, .span-full-height { grid-column: span 1; grid-row: span 1; }
            
            .hero-ram {
                min-height: 55vh;
                padding-top: 110px;
                border-radius: 0 0 30px 30px;
            }
            .hero-card {
                padding: 36px 24px;
                border-radius: 24px;
            }
            .hero-card h1 { font-size: 2.3rem; }
            .hero-card p { font-size: 0.98rem; }
            
            .section-wrap { padding: 60px 20px; }
            
            .nav-master { 
                padding: 10px 20px; 
                width: calc(100% - 24px);
                top: 12px;
                border-radius: 20px;
            }
            .logo-brand { font-size: 1.05rem; }
            .tifr-logo { width: 36px; height: 36px; }
            
            .mobile-toggle { display: block; }
            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                width: 100%;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(25px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.08);
                flex-direction: column;
                padding: 24px;
                gap: 14px;
                border-radius: 20px;
                border: 1px solid var(--border-soft);
                transform: translateY(-150%);
                opacity: 0;
                transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
                pointer-events: none;
                z-index: 1999;
            }
            .nav-links.mobile-active {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }
            .nav-links a {
                font-size: 1rem;
                padding: 10px 0;
                width: 100%;
                border-bottom: 1px solid #edf2ef;
            }
            .nav-links a:after { display: none; }

            /* MOBILE COMPACT TABLE CARD CONVERSION */
            .tariff-elegant {
                padding: 20px;
                border-radius: 24px;
            }
            .tariff-table, .tariff-table thead, .tariff-table tbody, .tariff-table th, .tariff-table td, .tariff-table tr {
                display: block;
            }
            .tariff-table thead { display: none; } 
            .tariff-table tr {
                background: #fbfdfc;
                border: 1px solid #e1ebe6;
                border-radius: 16px;
                padding: 16px;
                margin-bottom: 14px;
            }
            .tariff-table td {
                text-align: right;
                padding: 1
