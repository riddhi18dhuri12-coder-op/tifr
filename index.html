<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title> Ramanujan House | Official Guesthouse Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-ivory: #f4f7f5;
            --deep-teal: #062620;
            --accent-emerald: #12694b;
            --mint-glow: #eef8f4;
            --glass-white: rgba(255, 255, 255, 0.82);
            --border-soft: rgba(18, 105, 75, 0.12);
            --shadow-elevated: 0 20px 40px -15px rgba(6, 38, 32, 0.06), 0 0 0 1px rgba(18, 105, 75, 0.04);
            --shadow-hover: 0 35px 60px -20px rgba(6, 38, 32, 0.15), 0 0 0 1px var(--accent-emerald);
            --transition-butter: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ivory);
            color: #162a25;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e3ebe7; }
        ::-webkit-scrollbar-thumb { background: var(--accent-emerald); border-radius: 4px; }

        /* HEADER & NAVIGATION */
        .nav-master {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 1400px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 30px rgba(6, 38, 32, 0.04);
            padding: 10px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s var(--transition-butter);
        }
        
        .logo-brand-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* FLASHING NOTICE BANNER SYSTEM */
        .flashing-notice-bar {
            background-color: #ffebeb;
            border-bottom: 2px solid #ff4d4d;
            color: #cc0000;
            text-align: center;
            padding: 12px 20px;
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-top: 100px; 
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.05);
        }

        .flashing-notice-bar i {
            animation: notice-flash 1.2s infinite alternate cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes notice-flash {
            0% { opacity: 0.3; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.08); color: #ff0000; }
        }

        .hero-ram {
            margin-top: 0 !important;
            padding-top: 80px !important;
        }

        @media (max-width: 1024px) {
            .flashing-notice-bar {
                margin-top: 85px;
                font-size: 0.85rem;
                padding: 10px 16px;
            }
        }

        .tifr-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
            image-rendering: -webkit-optimize-contrast;
        }

        .logo-brand {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--deep-teal), var(--accent-emerald));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            white-space: nowrap;
        }
        
        .nav-links { display: flex; gap: 28px; }
        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            color: #23423a;
            transition: color 0.25s;
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
        }
        .nav-links a i { font-size: 0.8rem; opacity: 0.6; transition: transform 0.3s; }
        .nav-links a:hover { color: var(--accent-emerald); }
        .nav-links a:hover i { transform: translateY(-1px); opacity: 1; }
        
        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2.5px;
            background: var(--accent-emerald);
            border-radius: 2px;
            transition: width 0.3s var(--transition-butter);
        }
        .nav-links a:hover:after { width: 100%; }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--deep-teal);
            cursor: pointer;
            z-index: 2100;
            padding: 4px;
        }

        /* HERO AREA */
        .hero-ram {
            min-height: 75vh;
            background: linear-gradient(rgba(4, 25, 21, 0.6), rgba(6, 38, 32, 0.75)), url('main.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 0 40px 40px;
            position: relative;
            padding: 140px 20px 80px;
        }
        .hero-card {
            max-width: 820px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 48px 56px;
            border-radius: 32px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            animation: floatUp 1.2s var(--transition-butter);
        }
        .hero-card h1 {
            font-size: 3.4rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 18px;
            background: linear-gradient(120deg, #ffffff, #d5ece2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero-card p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; font-weight: 400; }
        
        .btn-primary {
            display: inline-flex;
            background: #ffffff;
            border: none;
            margin-top: 28px;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--deep-teal);
            gap: 10px;
            transition: all 0.4s var(--transition-butter);
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            align-items: center;
        }
        .btn-primary:hover { 
            transform: translateY(-3px) scale(1.02); 
            background: var(--mint-glow);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
